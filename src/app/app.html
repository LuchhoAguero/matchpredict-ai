  TEMPLATE RAÍZ: app.html
  Corresponde al componente App (selector: app-root)

  Este archivo es el "esqueleto" de toda la app.
  Define el layout principal que se mantiene en TODAS las páginas:

  ┌────────────────────────────────────────┐
  │           <app-header>                 │  ← Siempre visible (sticky)
  ├────────────────────────────────────────┤
  │                                        │
  │         <router-outlet>                │  ← Cambia según la URL:
  │   (aquí va el Hero o el Dashboard)     │     /home → HeroComponent
  │                                        │     /dashboard → DashboardComponent
  └────────────────────────────────────────┘

  <app-header> funciona porque importamos HeaderComponent en app.ts.
  <router-outlet> funciona porque importamos RouterOutlet en app.ts.
-->

<app-header />

<!-- Contenido principal dinámico (cambia con la ruta) -->
